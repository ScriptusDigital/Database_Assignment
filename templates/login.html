{% extends 'base.html' %}
{% block title %}Login - StudentPilot{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>Welcome</h1>
        <p class="form-intro">Log in to your account</p>

        <form method="POST" class="stacked-form" data-validated="true">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <label class="checkbox-row">
                <input type="checkbox" name="remember">
                <span>Remember me</span>
            </label>

            <button type="submit" class="btn btn-primary full-width">Login</button>
        </form>

        <p class="form-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</section>
{% endblock %}
