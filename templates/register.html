{% extends 'base.html' %}

{% block title %}Register - StudentPilot{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>Create Your Account</h1>
        <p class="form-intro">Register to start tracking your workload and budget</p>

        <form method="POST" class="stacked-form" data-validate="true">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required value="{{request.form.get('username','')}}">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required value="{{request.form.get('email','')}}">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn btn-primary full-width">Register</button>

        </form>


        <p class="form-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</section>








{% endblock %}
